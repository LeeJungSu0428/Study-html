<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입</title>
  <style>
    /* 전체 페이지 배경 설정 */
    body {
      margin: 0;
      padding: 0;
      font-family: "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #6a8dff, #a06bff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 회원가입 박스 */
    .signup-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .signup-box h1 {
      text-align: center;
      color: #333333;
      font-size: 24px;
      margin: 0 0 8px;
    }

    .signup-box .subtitle {
      text-align: center;
      color: #888888;
      font-size: 14px;
      margin: 0 0 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #555555;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dddddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .field input:focus {
      outline: none;
      border-color: #6a8dff;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #555555;
    }

    .checkbox-row input {
      width: auto;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6a8dff, #a06bff);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .submit-btn:hover {
      opacity: 0.9;
    }

    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888888;
    }

    .login-link a {
      color: #6a8dff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="signup-box">
    <h1>회원가입</h1>
    <p class="subtitle">지금 바로 시작해보세요</p>

    <form>
      <div class="field">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력하세요">
      </div>

      <div class="field">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="비밀번호">
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="agree" name="agree">
        <label for="agree">이용약관에 동의합니다</label>
      </div>

      <button type="submit" class="submit-btn">가입하기</button>
    </form>

    <p class="login-link">이미 계정이 있으신가요? <a href="#">로그인</a></p>
  </div>

</body>
</html>
